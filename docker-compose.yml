services:
  web:
    build: .
    container_name: blogbot_web
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - db

  bot:
    build: .
    container_name: blogbot_bot
    restart: unless-stopped
    env_file: .env
    command: python -m app.bot_runner
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: blogbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blogbot
      POSTGRES_PASSWORD: blogbot
      POSTGRES_DB: blogbot
    ports:
      - "5432:5432"
    volumes:
      - blogbot_pgdata:/var/lib/postgresql/data

volumes:
  blogbot_pgdata:
